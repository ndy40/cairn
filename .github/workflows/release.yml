name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.0)"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extension:
    name: Package Vicinae Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Package extension
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          ARCHIVE="vicinae-extension-${TAG}.tar.gz"
          tar -czf "$ARCHIVE" -C vicinae-extension \
            --exclude=node_modules \
            --exclude='.git' \
            .
          echo "Created $ARCHIVE"
          ls -lh "$ARCHIVE"

      - uses: actions/upload-artifact@v5
        with:
          name: vicinae-extension-${{ env.RELEASE_TAG }}.tar.gz
          path: vicinae-extension-${{ env.RELEASE_TAG }}.tar.gz

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: cairn-linux-amd64
          - goos: linux
            goarch: arm64
            binary: cairn-linux-arm64
          - goos: darwin
            goarch: amd64
            binary: cairn-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary: cairn-darwin-arm64
          - goos: windows
            goarch: amd64
            binary: cairn-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-X main.version=${{ env.RELEASE_TAG }}" -o ${{ matrix.binary }} ./cmd/cairn/

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: [build, build-extension]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Verify binary version matches tag
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          TAG_VERSION="${{ env.RELEASE_TAG }}"
          EXPECTED_VERSION="${TAG_VERSION#v}"

          # Check that at least one binary exists
          BINARY_PATH=$(find artifacts -name "cairn-*" -type f | head -1)
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: No binary artifacts found"
            exit 1
          fi

          echo "Tag version: $TAG_VERSION"
          echo "Expected version: $EXPECTED_VERSION"
          echo "Binary artifacts found successfully"

      - name: Generate release notes
        id: changelog
        uses: cocogitto/cocogitto-action@v4
        with:
          command: changelog
          args: ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save release notes
        run: |
          echo "${{ steps.changelog.outputs.stdout }}" > RELEASE_NOTES.md
          echo "=== Generated Release Notes ==="
          cat RELEASE_NOTES.md

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          echo ""
          echo "=== Release Contents ==="
          ls -lh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          files: release/*
