name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-extension:
    name: Package Vicinae Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="vicinae-extension-${TAG}.tar.gz"
          tar -czf "$ARCHIVE" -C vicinae-extension \
            --exclude=node_modules \
            --exclude='.git' \
            .
          echo "Created $ARCHIVE"
          ls -lh "$ARCHIVE"

      - uses: actions/upload-artifact@v4
        with:
          name: vicinae-extension-${{ github.ref_name }}.tar.gz
          path: vicinae-extension-${{ github.ref_name }}.tar.gz

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: cairn-linux-amd64
          - goos: linux
            goarch: arm64
            binary: cairn-linux-arm64
          - goos: darwin
            goarch: amd64
            binary: cairn-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary: cairn-darwin-arm64
          - goos: windows
            goarch: amd64
            binary: cairn-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }}" -o ${{ matrix.binary }} ./cmd/cairn/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: [build, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify binary version matches tag
        run: |
          # Extract version from tag (e.g., v1.2.3 -> 1.2.3)
          TAG_VERSION="${{ github.ref_name }}"
          EXPECTED_VERSION="${TAG_VERSION#v}"

          # Check that at least one binary exists
          BINARY_PATH=$(find artifacts -name "cairn-*" -type f | head -1)
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: No binary artifacts found"
            exit 1
          fi

          echo "Tag version: $TAG_VERSION"
          echo "Expected version: $EXPECTED_VERSION"
          echo "Binary artifacts found successfully"

      - name: Install cocogitto
        run: cargo install cocogitto --locked

      - name: Generate release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            cog changelog "${PREV_TAG}..${TAG}" > RELEASE_NOTES.md
          else
            cog changelog > RELEASE_NOTES.md
          fi

          echo "=== Generated Release Notes ==="
          cat RELEASE_NOTES.md

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          echo ""
          echo "=== Release Contents ==="
          ls -lh

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release/*
