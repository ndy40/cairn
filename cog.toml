# Cocogitto configuration
tag_prefix = "v"
branch_whitelist = ["main"]
ignore_merge_commits = true

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "cairn"
owner = "ndy40"
authors = []

[git_hooks]
# optional: validate commit messages locally
# enabled after running: cog install-hook commit-msg

[commit_types]
# Allow project-specific types beyond the conventional standard
doc = { changelog_title = "Documentation", omit_from_changelog = false }
tests = { changelog_title = "Tests", omit_from_changelog = false }
lint = { changelog_title = "Linting", omit_from_changelog = true }
perf = { changelog_title = "Performance", omit_from_changelog = false }
